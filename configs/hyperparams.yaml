# Sector Rotation RL — Default Hyperparameters

# Environment
state_dim: 9
action_dim: 4
override_threshold: 2.5

# DQN Architecture
hidden_dim: 128
num_layers: 2

# Training
learning_rate: 0.001
gamma: 0.99
batch_size: 64
buffer_size: 10000
target_update: 100
num_episodes: 2000
eps_start: 1.0
eps_end: 0.05
eps_decay_frac: 0.8
grad_clip: 1.0

# Reward Shaping
reward_type: 'sortino'
sortino_window: 20
sortino_target_return: 0.0

# Evaluation
train_end_date: '2023-12-31'
test_start_date: '2024-01-01'

# Seeds
seed: 42